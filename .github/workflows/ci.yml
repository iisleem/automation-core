name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Pytest
        run: pytest

      - name: Build package
        run: python -m build

      - name: Wheel smoke
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          .wheel-venv/bin/python -m pip install dist/*.whl
          .wheel-venv/bin/python -c "import automation_core; print(automation_core.__version__)"
          mkdir -p .tmp/allure-results
          cat > .tmp/allure-results/one-result.json <<'JSON'
          {"historyId":"ci-case","name":"test_ci","fullName":"tests.test_ci","status":"passed","start":100,"stop":250}
          JSON
          .wheel-venv/bin/automation-core-report --results .tmp/allure-results --output .tmp/product --project-name ci --framework pytest --run-id ci-run --no-history
          test -f .tmp/product/index.html
          test -f .tmp/product/timeline.html
          .wheel-venv/bin/automation-core-report --summary --results .tmp/allure-results --output .tmp/summary
          test -f .tmp/summary/index.html
